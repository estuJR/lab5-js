<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Blog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h1>Mini Blog</h1>

    <!-- BUSCADOR -->
    <input type="text" id="searchInput" placeholder="Buscar posts...">
    <button id="searchBtn">Buscar</button>

    <!-- FORMULARIO -->
    <h2>Crear Post</h2>
    <input type="text" id="title" placeholder="Título">
    <textarea id="body" placeholder="Contenido"></textarea>
    <button id="createBtn">Crear</button>

    <!-- ESTADOS -->
    <div id="status"></div>

    <!-- POSTS -->
    <div id="posts"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
